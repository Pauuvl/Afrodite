{% extends 'base.html' %}

{% block content %}
<style>
    body{
        font-family:'Poppins',sans-serif;
        background:#fafafa;
    }

    .titulo{
        font-family:'Playfair Display',serif;
    }

    .success-wrapper{
        min-height:80vh;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:40px 20px;
    }

    .success-card{
        background:#fff;
        border:1px solid #eee;
        border-radius:14px;
        padding:40px;
        max-width:520px;
        width:100%;
        text-align:center;
        box-shadow:0 4px 14px rgba(0,0,0,0.04);
    }

    .success-icon{
        font-size:40px;
        margin-bottom:18px;
    }

    .btn-afrodite{
        background:#111;
        color:#fff;
        border:none;
        padding:12px 18px;
        border-radius:8px;
        transition:0.3s;
        text-decoration:none;
        display:inline-block;
        margin-top:18px;
    }

    .btn-afrodite:hover{
        background:#333;
        color:#fff;
    }
</style>

<div class="success-wrapper">
    <div class="success-card">
        <div class="success-icon">✓</div>
        <h1 class="titulo mb-3">Pago completado éxitosamente</h1>
        <p class="text-muted">Tu pedido ha sido registrado correctamente ♡</p>
        <a href="{% url 'carrito:cart_detail' %}" class="btn-afrodite">Volver al carrito</a>
    </div>
</div>
{% endblock %}
