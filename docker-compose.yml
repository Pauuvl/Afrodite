services:
  afrodite_db:
    image: postgres:16
    container_name: afrodite_db
    restart: unless-stopped
    environment:
      # Superusuario inicial del contenedor
      POSTGRES_USER: afrodite_psql_usr
      POSTGRES_PASSWORD: afrodite_superuser_pwd
    ports:
      - "5432:5432"
    volumes:
      # Persistencia de datos del cluster
      - pgdata:/var/lib/postgresql/data
      # Scripts .sql/.sh que se ejecutan 1 sola vez (cuando el volumen está vacío)
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afrodite_psql_usr -d afrodite_psql_usr"]
      interval: 5s
      timeout: 5s
      retries: 20

  afrodite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: afrodite_web
    ports:
      - "8000:8000"
      #env_file:
      #- .env        # coloca aquí variables como DEBUG, DB, etc.
    environment:
      POSTGRES_USER: afrodite_usr
      POSTGRES_PASSWORD: afrodite_pwd
      POSTGRES_HOST: afrodite_db
      POSTGRES_DB: afrodite
      POSTGRES_PORT: 5432
    depends_on:
      afrodite_db:
        condition: service_healthy
    volumes:
      - .:/app

  # (Opcional) Adminer para inspeccionar la DB vía navegador
  adminer:
    image: adminer:4
    container_name: afrodite_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      afrodite_db:
        condition: service_healthy

volumes:
  pgdata: