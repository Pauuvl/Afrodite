services:
  db:
    image: postgres:16
    container_name: afrodite_db
    restart: unless-stopped
    environment:
      # Superusuario inicial del contenedor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: afrodite_superuser
    ports:
      - "5432:5432"
    volumes:
      # Persistencia de datos del cluster
      - pgdata:/var/lib/postgresql/data
      # Scripts .sql/.sh que se ejecutan 1 sola vez (cuando el volumen está vacío)
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  # (Opcional) Adminer para inspeccionar la DB vía navegador
  adminer:
    image: adminer:4
    container_name: afrodite_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: