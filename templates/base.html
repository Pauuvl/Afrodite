<!-- Paulina velasquez y Helen Sanabria-->
{% load static i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <title>Afrodite</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="{% static 'js/script.js' %}"></script>
<style>
.lang-switcher { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; gap: 6px; }
.lang-switcher form button {
    background: #2b2b2b; color: white; border: none; border-radius: 6px;
    padding: 5px 12px; font-size: 11px; font-family: 'Poppins', sans-serif;
    cursor: pointer; transition: background .2s; font-weight: 500; letter-spacing: .5px;
}
.lang-switcher form button:hover { background: #555; }
.lang-switcher form button.active { background: #f7c5d0; color: #2b2b2b; }
</style>
</head>
<body>
    <!-- ICONOS SVG -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none;">

  <!-- Flecha izquierda -->
  <symbol id="arrow-left" viewBox="0 0 24 24">
    <path d="M15 6L9 12L15 18" stroke="black" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Flecha derecha -->
  <symbol id="arrow-right" viewBox="0 0 24 24">
    <path d="M9 6L15 12L9 18" stroke="black" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

</svg>

{% block content %}
{% endblock %}

<!-- SELECTOR DE IDIOMA -->
<div class="lang-switcher">
    {% get_current_language as CURRENT_LANG %}
    <form action="{% url 'set_language' %}" method="post">
        {% csrf_token %}
        <input type="hidden" name="language" value="es">
        <input type="hidden" name="next" value="{{ request.get_full_path }}">
        <button type="submit" {% if CURRENT_LANG == 'es' %}class="active"{% endif %}>ES</button>
    </form>
    <form action="{% url 'set_language' %}" method="post">
        {% csrf_token %}
        <input type="hidden" name="language" value="en">
        <input type="hidden" name="next" value="{{ request.get_full_path }}">
        <button type="submit" {% if CURRENT_LANG == 'en' %}class="active"{% endif %}>EN</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/script.js' %}"></script>

</body>
</html>
